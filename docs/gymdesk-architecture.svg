<svg viewBox="0 0 820 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <title>GymDesk Architecture — Vercel + AWS DynamoDB</title>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-acc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arr-aws" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Layer: Browser -->
  <rect x="20" y="20" width="780" height="90" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="36" y="40" font-size="9" font-weight="700" letter-spacing="0.1em" fill="#94a3b8">BROWSER</text>

  <!-- Layer: Vercel -->
  <rect x="20" y="128" width="780" height="140" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="36" y="148" font-size="9" font-weight="700" letter-spacing="0.1em" fill="#94a3b8">VERCEL</text>

  <!-- Layer: AWS -->
  <rect x="20" y="288" width="780" height="230" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="36" y="308" font-size="9" font-weight="700" letter-spacing="0.1em" fill="#d97706">AWS</text>

  <!-- ── BROWSER ──────────────────────────────────────── -->
  <rect x="50" y="46" width="200" height="52" rx="8" fill="#2563eb"/>
  <text x="150" y="68" font-size="13" font-weight="700" fill="white" text-anchor="middle">Angular 22 SPA</text>
  <text x="150" y="86" font-size="10" fill="#bfdbfe" text-anchor="middle">Signals · Standalone · i18n</text>

  <rect x="310" y="46" width="160" height="52" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="390" y="68" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">Google OAuth</text>
  <text x="390" y="84" font-size="10" fill="#64748b" text-anchor="middle">Sign-in via Auth.js</text>

  <rect x="540" y="46" width="200" height="52" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="640" y="68" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">Vercel CDN</text>
  <text x="640" y="84" font-size="10" fill="#64748b" text-anchor="middle">Static assets (global)</text>

  <!-- ── VERCEL SERVERLESS ───────────────────────────── -->
  <rect x="50" y="158" width="200" height="88" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="150" y="178" font-size="11" font-weight="700" fill="#0f172a" text-anchor="middle">/api/auth/*</text>
  <text x="150" y="196" font-size="10" fill="#64748b" text-anchor="middle">Auth.js + Google OAuth</text>
  <text x="150" y="212" font-size="10" fill="#64748b" text-anchor="middle">session cookie strategy</text>
  <text x="150" y="228" font-size="10" fill="#64748b" text-anchor="middle">Zod validation</text>

  <rect x="290" y="158" width="220" height="88" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="400" y="178" font-size="11" font-weight="700" fill="#0f172a" text-anchor="middle">API Route Handlers</text>
  <text x="340" y="198" font-size="10" fill="#64748b" text-anchor="middle">/api/checkin</text>
  <text x="460" y="198" font-size="10" fill="#64748b" text-anchor="middle">/api/perfil(s)</text>
  <text x="340" y="216" font-size="10" fill="#64748b" text-anchor="middle">/api/avaliacao</text>
  <text x="460" y="216" font-size="10" fill="#64748b" text-anchor="middle">/api/session</text>
  <text x="400" y="234" font-size="10" fill="#64748b" text-anchor="middle">/api/programa-treino</text>

  <rect x="550" y="158" width="200" height="88" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="650" y="178" font-size="11" font-weight="700" fill="#d97706" text-anchor="middle">DB Abstraction</text>
  <text x="650" y="196" font-size="10" fill="#64748b" text-anchor="middle">server/lib/db.ts</text>
  <text x="650" y="212" font-size="10" fill="#64748b" text-anchor="middle">dynamo-provider.ts</text>
  <text x="650" y="228" font-size="10" fill="#64748b" text-anchor="middle">MongoDB-like API</text>
  <text x="650" y="244" font-size="10" fill="#d97706" text-anchor="middle">→ AWS SDK v3</text>

  <!-- ── AWS DYNAMODB ────────────────────────────────── -->
  <!-- Main DynamoDB box -->
  <rect x="50" y="322" width="620" height="170" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="346" font-size="14" font-weight="700" fill="#d97706" text-anchor="middle">AWS DynamoDB  —  PAY_PER_REQUEST</text>

  <!-- Tables -->
  <rect x="70" y="358" width="180" height="118" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="160" y="376" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">gymdesk-checkins</text>
  <text x="160" y="394" font-size="10" fill="#64748b" text-anchor="middle">PK: _id (String)</text>
  <text x="160" y="410" font-size="10" fill="#64748b" text-anchor="middle">GSI: userId-index</text>
  <text x="160" y="432" font-size="10" fill="#0f172a" text-anchor="middle">workout logs</text>
  <text x="160" y="448" font-size="10" fill="#0f172a" text-anchor="middle">exercise loads (cargas)</text>
  <text x="160" y="464" font-size="10" fill="#0f172a" text-anchor="middle">date, notes</text>

  <rect x="270" y="358" width="180" height="118" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="360" y="376" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">gymdesk-perfis</text>
  <text x="360" y="394" font-size="10" fill="#64748b" text-anchor="middle">PK: userId (String)</text>
  <text x="360" y="432" font-size="10" fill="#0f172a" text-anchor="middle">name, roles</text>
  <text x="360" y="448" font-size="10" fill="#0f172a" text-anchor="middle">student / teacher</text>
  <text x="360" y="464" font-size="10" fill="#0f172a" text-anchor="middle">teacherIds</text>

  <rect x="470" y="358" width="180" height="118" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="560" y="376" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">gymdesk-avaliacoes</text>
  <text x="560" y="394" font-size="10" fill="#64748b" text-anchor="middle">PK: _id  GSI: userId</text>
  <text x="560" y="432" font-size="10" fill="#0f172a" text-anchor="middle">body metrics</text>
  <text x="560" y="448" font-size="10" fill="#0f172a" text-anchor="middle">targets (metas)</text>
  <text x="560" y="464" font-size="10" fill="#0f172a" text-anchor="middle">gymdesk-programas-treino</text>

  <!-- IAM -->
  <rect x="700" y="322" width="80" height="60" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="740" y="346" font-size="10" font-weight="700" fill="#d97706" text-anchor="middle">IAM</text>
  <text x="740" y="362" font-size="9" fill="#64748b" text-anchor="middle">Access Key</text>
  <text x="740" y="376" font-size="9" fill="#64748b" text-anchor="middle">+ Secret</text>

  <!-- ── ARROWS ──────────────────────────────────────── -->
  <!-- Angular → auth/routes -->
  <line x1="150" y1="98" x2="150" y2="158" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-acc)"/>
  <line x1="250" y1="72" x2="290" y2="72" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="320" y1="98" x2="400" y2="158" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-acc)"/>
  <!-- Google → auth -->
  <line x1="390" y1="98" x2="210" y2="158" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <!-- routes → DB abstraction -->
  <line x1="510" y1="202" x2="550" y2="202" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-aws)"/>
  <!-- DB abstraction → DynamoDB -->
  <line x1="650" y1="246" x2="450" y2="322" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-aws)"/>
  <!-- IAM → DynamoDB abstraction (auth) -->
  <line x1="700" y1="340" x2="750" y2="260" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-aws)"/>

  <!-- Legend -->
  <line x1="50" y1="518" x2="80" y2="518" stroke="#2563eb" stroke-width="2"/>
  <text x="88" y="522" font-size="10" fill="#64748b">HTTP / API</text>
  <line x1="180" y1="518" x2="210" y2="518" stroke="#f59e0b" stroke-width="2"/>
  <text x="218" y="522" font-size="10" fill="#64748b">AWS SDK call</text>
  <line x1="330" y1="518" x2="360" y2="518" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="368" y="522" font-size="10" fill="#64748b">OAuth redirect</text>
  <rect x="480" y="511" width="12" height="12" rx="2" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="498" y="522" font-size="10" fill="#64748b">DB abstraction</text>
</svg>