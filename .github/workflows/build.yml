name: Production Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Production Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Unit tests (Vitest — services + server)
        run: npm run test:unit
      - name: Component tests (ng test — Angular components)
        run: npm run test:ng
      - name: Build
        run: npx ng build --configuration=production
