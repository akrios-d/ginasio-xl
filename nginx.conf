# Ginásio XL nginx config — copiado para /etc/nginx/conf.d/default.conf (dentro de http {}).
#
# CSP em variável de mapa para ser reutilizada em todos os location blocks.
map $host $gxl_csp {
    default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://accounts.google.com https://*.googleapis.com; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ─────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options          "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options   "nosniff"                           always;
        add_header X-XSS-Protection         "1; mode=block"                     always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;
        add_header Content-Security-Policy  $gxl_csp                            always;
    }

    # ── Assets com hash — cache longa ────────────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control          "public, immutable"  always;
        add_header X-Content-Type-Options "nosniff"            always;
    }

    # ── index.html — sem cache, headers de segurança completos ───────────────────
    location = /index.html {
        add_header Cache-Control            "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options          "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options   "nosniff"                             always;
        add_header X-XSS-Protection         "1; mode=block"                       always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;
        add_header Content-Security-Policy  $gxl_csp                              always;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
