@if (!isLoginPage()) {
  <header class="app-shell">
    <div class="brand-block">
      <img src="/icons/icon-36x36.png" alt="GymDesk" class="brand-logo" />
      @if (auth.isAuthenticated()) {
        <span class="brand-greeting">{{ greeting() }}</span>
      }
    </div>
    @if (auth.isAuthenticated()) {
      <button
        type="button"
        class="btn-header-signout"
        (click)="auth.logout()"
        [attr.aria-label]="i18n.t('app.signOut')"
      >
        <app-icon name="logout" [size]="18" />
      </button>
    }
  </header>

  @if (auth.isAuthenticated()) {
    <nav class="app-nav" aria-label="Main navigation">
      <div class="nav-inner">
        <a
          class="nav-link"
          routerLink="/"
          routerLinkActive="nav-link--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <app-icon name="home" [size]="20" aria-hidden="true" />
          <span class="nav-label">{{ i18n.t('nav.home') }}</span>
        </a>
        <a class="nav-link" routerLink="/training" routerLinkActive="nav-link--active">
          <app-icon name="dumbbell" [size]="20" aria-hidden="true" />
          <span class="nav-label">{{ i18n.t('nav.treino') }}</span>
        </a>
        <a class="nav-link" routerLink="/assessment" routerLinkActive="nav-link--active">
          <app-icon name="chart" [size]="20" aria-hidden="true" />
          <span class="nav-label">{{ i18n.t('nav.avaliacao') }}</span>
        </a>
        <a class="nav-link" routerLink="/profile" routerLinkActive="nav-link--active">
          <app-icon name="person" [size]="20" aria-hidden="true" />
          <span class="nav-label">{{ i18n.t('nav.perfil') }}</span>
        </a>
      </div>
    </nav>
  }
}

<main>
  <router-outlet />
</main>

<app-toast />
