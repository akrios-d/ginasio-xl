<header class="app-shell">
  <div class="brand-block">
    <p class="brand-kicker">{{ i18n.t('app.kicker') }}</p>
    <h1>{{ i18n.appTitle() }}</h1>
  </div>

  <div class="shell-actions">
    <app-theme-toggle />

    <div class="lang-picker" [class.lang-picker--open]="langMenuOpen()">
      <button
        type="button"
        class="lang-trigger"
        (click)="toggleLangMenu()"
        [attr.aria-label]="i18n.t('app.languageLabel')"
        [attr.aria-expanded]="langMenuOpen()"
      >
        <app-flag [lang]="i18n.language()" />
        <span class="lang-chevron" aria-hidden="true">›</span>
      </button>

      @if (langMenuOpen()) {
        <button
          type="button"
          class="lang-backdrop"
          (click)="closeLangMenu()"
          tabindex="-1"
          aria-hidden="true"
        ></button>

        <div class="lang-dropdown" role="menu">
          @for (option of i18n.languageOptions; track option.code) {
            <button
              type="button"
              class="lang-option"
              [class.lang-option--active]="i18n.language() === option.code"
              (click)="pickLanguage(option.code)"
              role="menuitem"
            >
              <app-flag [lang]="option.code" />
            </button>
          }
        </div>
      }
    </div>

    @if (auth.isAuthenticated()) {
      <button
        type="button"
        class="logout-btn"
        (click)="auth.logout()"
        [attr.aria-label]="i18n.t('app.signOut')"
        [title]="auth.user()?.email ?? auth.user()?.name ?? ''"
      >
        {{ i18n.t('app.signOut') }}
      </button>
    }
  </div>
</header>

<main>
  <router-outlet />
</main>

<app-toast />
